        </button>

<script>
        const slider = document.getElementById('noise-slider');
        const waveform = document.getElementById('waveform');
        const vibeLabel = document.getElementById('vibe-label');
        const nextBtn = document.getElementById('next-button');
        const barCount = 40;
        const bars = [];

        const vibes = [
            { threshold: 0, label: "Silent Study", color: "#aad53d" },
            { threshold: 25, label: "Whisper Zone", color: "#aad53d" },
            { threshold: 50, label: "Coffee Shop Hum", color: "#C8F55A" },
            { threshold: 75, label: "Lively Social", color: "#C8F55A" },
            { threshold: 90, label: "Concert Peak", color: "#ffffff" }
        ];

        // Initialize Waveform
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'noise-bar w-1.5 md:w-2 bg-on-surface-variant rounded-full opacity-40 transition-all';
            waveform.appendChild(bar);
            bars.push(bar);
        }

        function updateWaveform(val) {
            const intensity = val / 100;
            
            bars.forEach((bar, i) => {
                // Calculate "chaos" based on intensity and sine waves
                const freq = 0.5 + (intensity * 2);
                const randomPart = Math.random() * (intensity * 60);
                const sinePart = Math.sin((i / barCount) * Math.PI * 4) * (intensity * 40);
                const baseHeight = 8 + (intensity * 20);
                
                const finalHeight = baseHeight + randomPart + sinePart;
                
                bar.style.height = `${Math.max(8, finalHeight)}px`;
                
                // Color shift based on intensity
                if (intensity > 0.8) {
                    bar.style.backgroundColor = '#ffffff';
                    bar.style.opacity = '0.9';
                } else if (intensity > 0.4) {
                    bar.style.backgroundColor = '#C8F55A';
                    bar.style.opacity = '0.7';
                } else {
                    bar.style.backgroundColor = '#aad53d';
                    bar.style.opacity = '0.4';
                }
            });

            // Update Label
            const currentVibe = vibes.slice().reverse().find(v => val >= v.threshold);
            vibeLabel.innerText = currentVibe.label;
            vibeLabel.style.color = currentVibe.color;

            // Update Button State
            if (val > 0) {
                nextBtn.classList.remove('bg-surface-container', 'text-on-surface-variant', 'pointer-events-none', 'opacity-50');
                nextBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-lg');
            }
        }

        slider.addEventListener('input', (e) => {
            updateWaveform(e.target.value);
            
            // Interaction feedback
            slider.style.transform = `scaleY(${1 + (e.target.value / 400)})`;
            setTimeout(() => {
                slider.style.transform = `scaleY(1)`;
            }, 100);
        });

        // Loop for ambient movement
        function animate() {
            const val = parseInt(slider.value);
            updateWaveform(val);
            setTimeout(() => requestAnimationFrame(animate), 100);
        }

        animate();

        // Button Micro-interaction
        nextBtn.addEventListener('mousedown', () => {
            nextBtn.style.transform = 'scale(0.96)';
        });
        nextBtn.addEventListener('mouseup', () => {
            nextBtn.style.transform = 'scale(1)';
        });
    </script>
