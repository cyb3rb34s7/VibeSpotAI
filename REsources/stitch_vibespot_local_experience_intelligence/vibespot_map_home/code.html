<script>
        const sheet = document.getElementById('bottom-sheet');
        const handle = document.getElementById('sheet-handle');
        let isOpen = false;

        handle.addEventListener('click', () => {
            if (isOpen) {
                sheet.style.transform = 'translateY(68%)';
            } else {
                sheet.style.transform = 'translateY(0%)';
            }
            isOpen = !isOpen;
        });

        // Basic touch handling for the sheet
        let startY;
        handle.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
        });

        handle.addEventListener('touchmove', e => {
            const currentY = e.touches[0].clientY;
            const diff = startY - currentY;
            if (diff > 50 && !isOpen) {
                sheet.style.transform = 'translateY(0%)';
                isOpen = true;
            } else if (diff < -50 && isOpen) {
                sheet.style.transform = 'translateY(68%)';
                isOpen = false;
            }
        });

        // Add subtle map drift movement
        const map = document.querySelector('[data-location]');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            map.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
        });
    </script>
