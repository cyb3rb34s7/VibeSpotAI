<script>
        const sheet = document.getElementById('bottom-sheet');
        const handle = document.getElementById('sheet-handle');
        let isOpen = false;

        handle.addEventListener('click', () => {
            if (isOpen) {
                sheet.style.transform = 'translateY(68%)';
            } else {
                sheet.style.transform = 'translateY(0%)';
            }
            isOpen = !isOpen;
        });

        // Basic touch handling for the sheet
        let startY;
        handle.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
        });

        handle.addEventListener('touchmove', e => {
            const currentY = e.touches[0].clientY;
            const diff = startY - currentY;
            if (diff > 50 && !isOpen) {
                sheet.style.transform = 'translateY(0%)';
                isOpen = true;
            } else if (diff < -50 && isOpen) {
                sheet.style.transform = 'translateY(68%)';
                isOpen = false;
            }
        });

    </script>
<script>
        // Load Google Maps with a cinematic dark style (Snapchat-like)
        window.initVibeSpotMap = function () {
            const center = { lat: 12.9719, lng: 77.6412 }; // Indiranagar, Bangalore
            const darkStyle = [
                {elementType:"geometry",stylers:[{color:"#0f0f10"}]},
                {elementType:"labels.text.stroke",stylers:[{color:"#0f0f10"}]},
                {elementType:"labels.text.fill",stylers:[{color:"#6b6f7a"}]},
                {featureType:"administrative",elementType:"geometry",stylers:[{color:"#2a2b33"}]},
                {featureType:"administrative.land_parcel",stylers:[{visibility:"off"}]},
                {featureType:"poi",stylers:[{visibility:"off"}]},
                {featureType:"road",elementType:"geometry",stylers:[{color:"#1c1d24"}]},
                {featureType:"road",elementType:"geometry.stroke",stylers:[{color:"#0f0f10"}]},
                {featureType:"road.highway",elementType:"geometry",stylers:[{color:"#2b2d36"}]},
                {featureType:"road.highway",elementType:"geometry.stroke",stylers:[{color:"#aad53d"},{weight:0.3}]},
                {featureType:"transit",stylers:[{visibility:"off"}]},
                {featureType:"water",elementType:"geometry",stylers:[{color:"#070709"}]},
                {featureType:"water",elementType:"labels.text.fill",stylers:[{color:"#3a3d48"}]},
                {featureType:"landscape",elementType:"geometry",stylers:[{color:"#13141b"}]}
            ];
            const map = new google.maps.Map(document.getElementById("vibespot-map"), {
                center, zoom: 15, styles: darkStyle,
                disableDefaultUI: true, gestureHandling: "greedy",
                backgroundColor: "#0f0f10", tilt: 0,
                clickableIcons: false,
            });

            // Real Bangalore restaurants with vibe metadata
            const places = [
                { name: "Toit Brewpub", tag: "Craft Beer", icon: "sports_bar", match: 96, color: "lime", lat: 12.9784, lng: 77.6408, desc: "Wood-fired pizzas & house brews" },
                { name: "Truffles", tag: "Burgers", icon: "lunch_dining", match: 92, color: "lime", lat: 12.9352, lng: 77.6245, desc: "Cult-favorite burger joint" },
                { name: "Karavalli", tag: "Coastal", icon: "restaurant", match: 89, color: "coral", lat: 12.9667, lng: 77.5963, desc: "Award-winning South Indian" },
                { name: "The Permit Room", tag: "Modern Indian", icon: "local_bar", match: 87, color: "coral", lat: 12.9719, lng: 77.6395, desc: "Retro bar & regional plates" },
                { name: "Glen's Bakehouse", tag: "Cafe", icon: "bakery_dining", match: 84, color: "teal", lat: 12.9716, lng: 77.6411, desc: "Cakes, coffee & brunch" },
                { name: "Smoke House Deli", tag: "Continental", icon: "ramen_dining", match: 81, color: "teal", lat: 12.9698, lng: 77.7500, desc: "All-day European deli" },
                { name: "Corner House", tag: "Desserts", icon: "icecream", match: 90, color: "lime", lat: 12.9611, lng: 77.6387, desc: "Iconic Death By Chocolate" },
            ];

            const colorMap = {
                lime:  { bg: "#aad53d", text: "#1a2400", glow: "rgba(170,213,61,0.8)" },
                coral: { bg: "#ffb59d", text: "#5d1900", glow: "rgba(255,181,157,0.6)" },
                teal:  { bg: "#4DB6AC", text: "#ffffff", glow: "rgba(77,182,172,0.5)" },
            };

            class VibeMarker extends google.maps.OverlayView {
                constructor(place) { super(); this.place = place; }
                onAdd() {
                    const p = this.place; const c = colorMap[p.color] || colorMap.lime;
                    const wrap = document.createElement("div");
                    wrap.style.cssText = "position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;cursor:pointer;font-family:'Hanken Grotesk',sans-serif;";
                    wrap.innerHTML = `
                      <div style="background:rgba(20,21,28,0.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:8px 10px;min-width:140px;max-width:200px;box-shadow:0 8px 24px rgba(0,0,0,0.5);margin-bottom:6px;">
                        <div style="display:flex;align-items:center;gap:8px;">
                          <div style="width:32px;height:32px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px ${c.glow};flex-shrink:0;">
                            <span class="material-symbols-outlined" style="font-size:18px;color:${c.text};font-variation-settings:'FILL' 1;">${p.icon}</span>
                          </div>
                          <div style="min-width:0;flex:1;">
                            <div style="color:#fff;font-size:12px;font-weight:700;line-height:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
                            <div style="color:#c4c9b1;font-size:10px;line-height:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.tag} • ${p.match}%</div>
                          </div>
                        </div>
                        <div style="color:#8e937d;font-size:10px;line-height:13px;margin-top:4px;">${p.desc}</div>
                      </div>
                      <div style="width:10px;height:10px;border-radius:50%;background:${c.bg};box-shadow:0 0 12px ${c.glow};"></div>
                    `;
                    this.div = wrap;
                    this.getPanes().floatPane.appendChild(wrap);
                }
                draw() {
                    if (!this.div) return;
                    const proj = this.getProjection(); if (!proj) return;
                    const pos = proj.fromLatLngToDivPixel(new google.maps.LatLng(this.place.lat, this.place.lng));
                    this.div.style.left = pos.x + "px";
                    this.div.style.top  = pos.y + "px";
                }
                onRemove() { if (this.div) { this.div.remove(); this.div = null; } }
            }

            places.forEach(p => { const m = new VibeMarker(p); m.setMap(map); });
        };

        (function loadMaps() {
            const params = new URLSearchParams(window.location.search);
            const key = params.get("k");
            const channel = params.get("c") || "";
            if (!key) { console.warn("Missing Google Maps key"); return; }
            const s = document.createElement("script");
            s.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&loading=async&callback=initVibeSpotMap&channel=${encodeURIComponent(channel)}`;
            s.async = true; s.defer = true;
            document.head.appendChild(s);
        })();
    </script>
